                          <div class="aem-GridColumn aem-GridColumn--default--12">
                           <div id="_content_optus_en_for-you_internet_nbn_jcr_content_root_container_container_container_copy_responsive-container_responsive_container_accordion_1712554614901320d54de-353c-4096-8f69-9f99548976db_item_1_text_optus_1712554614902557d0508-81a3-4f4f-ae65-8ba0b50e9142">
                            <div class="lux-component-container" component="TextComponent" datamodel="{&quot;layout&quot;:{&quot;sm&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;desktopColumn&quot;:&quot;&quot;},&quot;md&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;phoneColumn&quot;:&quot;&quot;},&quot;la&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;tabletColumn&quot;:&quot;&quot;}},&quot;textId&quot;:&quot;_content_optus_en_for-you_internet_nbn_jcr_content_root_container_container_container_copy_responsive-container_responsive_container_accordion_1712554614901320d54de-353c-4096-8f69-9f99548976db_item_1_text_optus_1712554614902557d0508-81a3-4f4f-ae65-8ba0b50e9142&quot;,&quot;isScroll&quot;:false,&quot;disableWarningAriaRole&quot;:false,&quot;text&quot;:&quot;&lt;p&gt;&lt;b&gt;CSG Waiver&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;By accepting the benefits of this offer, you will need to agree to a waiver of your rights under the Customer Service Guarantee Standard (CSG Waiver) before you can sign up to a standard telephone service provided by Optus. For more information, see &lt;a href=\&quot;https://www.optus.com.au/yourCSG\&quot;&gt;optus.com.au/yourCSG&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;General&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Fair Go Policy applies to all Optus internet, voice and add-on services. Available in selected premises.&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;Offer available to credit approved customers.&lt;/p&gt;\n&lt;p&gt;These plans are subscription plans that do not include paper bills and require you to set up automatic payments (i.e. direct debit) via a credit, debit or charge card as the only payment method for these plans. Automatic payments from a bank account is not an option. See “Payment Information” below for more details.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Fees, charges, and cancellation&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Start-up fee&lt;/b&gt;: There is no start-up fee for these plans.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Installation fees&lt;/b&gt;: Installation fees may apply if you request a technician for set up where a self- install option is available. Optus may send you an Optus self-installation kit. Additional fees may apply for a first time nbn connection to dwellings in new developments or for any additional lines or non-standard installations.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Minimum term&lt;/b&gt;: For month to month plans or services, you must connect for a minimum of one month. Minimum term and charging commence when your service is operational (for more details, see also ‘Use of Optus supplied modem and nbn services’ terms under ‘Important service and equipment information’ below).&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Minimum total cost&lt;/b&gt;: Minimum total cost for each month-to-month plan is calculated by adding the full device costs (if any) and one month of the applicable plan fee.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Phone plans and calls&lt;/b&gt;: You must preselect Optus as both your local and long-distance carrier. The Optus Plus Phone Extra add on plan includes:&lt;/p&gt;\n&lt;ul&gt;\n &lt;li&gt;Unlimited calls to standard national numbers (which does not include special numbers such as 13/1300 numbers, premium numbers (e.g. 1900 numbers), 1234, 12456 and calls to satellite numbers); and&lt;/li&gt;\n &lt;li&gt;500 calls to 13/1300 numbers:\n  &lt;ul&gt;\n   &lt;li&gt;Calls to help lines like Beyond Blue and Lifeline will not be charged and don’t count towards the 500 calls.&lt;/li&gt;\n   &lt;li&gt;After 500 calls, customer will be charged $10 for the rest of the month.&lt;/li&gt;\n  &lt;/ul&gt;&lt;/li&gt;\n &lt;li&gt;No line rental fee is charged as part of the required CSG Waiver.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;b&gt;International call rates&lt;/b&gt;: You have the option to add an international call pack. The month-to- month Optus Plus Phone International calling pack includes unlimited calls to selected overseas destinations (currently 30) and can be added or removed at any time. Unless you purchase the Optus Plus Phone International calling pack, you will not be able to make international calls on the Optus Plus Phone Extra plan. Information on calling packs can be found at: &lt;a href=\&quot;https://www.optus.com.au/optusplusphoneinternational\&quot;&gt;optus.com.au/optusplusphoneinternational&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Cancellation&lt;/b&gt;&lt;/p&gt;\n&lt;ul&gt;\n &lt;li&gt;You can cancel your plan at any time by notifying us. You will not receive a refund of charges paid in advance for the remainder of your payment cycle, unless otherwise set out in our agreement and subject to your consumer law rights. Any related device payment plan will be cancelled and you’ll need to pay out any remaining device payments in full and any other charges owing, as a one-off payment.&lt;/li&gt;\n &lt;li&gt;For subscriptions via SubHub - If you wish to retain access to your subscriptions after cancelling your plan in SubHub, you can set up alternative payment methods. Contact Subscription providers to discuss billing options. See “Optus SubHub” terms below for more information.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;b&gt;Device Payment Plans&lt;/b&gt;&lt;/p&gt;\n&lt;ul&gt;\n &lt;li&gt;Where Optus offers an eligible device on a device payment plan the following options may be available:\n  &lt;ul&gt;\n   &lt;li&gt;Optus may cover the cost of the device as part of the plan while you remain connected for a specified term (we’ll let you know if this applies); or&lt;/li&gt;\n   &lt;li&gt;You can pay for a device over a term which we will allow you to select (i.e., ‘pay overtime’ or POT) by monthly instalments, (each a Device Payment Plan or DPP).&lt;/li&gt;\n  &lt;/ul&gt;&lt;/li&gt;\n &lt;li&gt;You will need to remain on an eligible Optus plan for the term of your DPP. If you cancel your eligible plan or move to an ineligible plan before expiry of your DPP, your DPP will also be cancelled, and you’ll need to pay out the remaining device payments in full. Any applicable device credits or discounts will be forfeited. This is subject to your Australian Consumer Law rights. Optus may limit the number of eligible devices per Optus plan.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;b&gt;Payment information&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;You will be automatically charged via your selected credit, debit or charge card at the start of each payment cycle for recurring charges. By signing up to these plans, you are agreeing to the Optus automatic payment terms at &lt;a href=\&quot;https://www.optus.com.au/about/legal/automatic-payment-terms\&quot;&gt;optus.com.au/about/legal/automatic-payment-terms&lt;/a&gt;. For further details visit &lt;a href=\&quot;https://www.optus.com.au/paymentsetup\&quot;&gt;optus.com.au/paymentsetup&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;An electronic tax invoice will be provided after payment. We do not provide paper bills or invoices for these plans. You can view your Invoices and update your payment details at any time in My Optus app or by visiting MyAccount.&lt;/p&gt;\n&lt;p&gt;As your payment method is required to be automatic payments in the form of direct debit from a credit, debit or charge card, there are no processing fees. For more info, go to &lt;a href=\&quot;https://www.optus.com.au/payments\&quot;&gt;optus.com.au/payments&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Important service and equipment information&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Serviceability&lt;/b&gt;: Unfortunately, we cannot guarantee connection until we successfully install your service.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Priority Assistance&lt;/b&gt;: We do not offer Priority Assistance. A provider who does is Telstra.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Equipment and battery back-up&lt;/b&gt;: Equipment supplied requires mains power, which may not be suitable if you have a serious illness or condition and require an uninterrupted telephone or data service. We do not support battery back-up functionality for nbn services and in most cases, nbn services will not function during a power failure.&lt;/p&gt;\n&lt;p&gt;Some equipment like back-to-base and medical alarms and other devices may not be compatible with the nbn or the 4G backup service and are not tested by us or supported on the Optus nbn. You should contact your device supplier to find out if your device will work before connecting to the nbn network.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Accessibility&lt;/b&gt;: For information about products and services we offer for customers with different disabilities, please see: &lt;a href=\&quot;https://www.optus.com.au/about/inclusion-diversity/differing-abilities/disability-services\&quot;&gt;optus.com.au/about/inclusion-diversity/differing-abilities/disability-services&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Use of Optus supplied modem and nbn services&lt;/b&gt;: Optus is required by law to confirm your nbn service is working. We may not be able to confirm this if you do not use an Optus Supplied modem. If you use a modem not supplied by Optus, that is, your own modem, we won’t be able to confirm your voice service (if applicable) is working so it may not be operational, and you will need to inform Optus of any issues with your nbn service before those issues will be rectified. If we supply you with an Optus modem, you should use the Optus supplied modem to ensure your Optus Service is operating optimally.&lt;/p&gt;\n&lt;p&gt;Billing will commence once we confirm your nbn broadband service is operational or once we’ve automatically completed your order (whichever occurs first).&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;nbn FTTC and HFC:&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;If you are:&lt;/p&gt;\n&lt;ul&gt;\n &lt;li&gt;an Optus nbn FTTC customer and fail to plug in your nbn equipment within 30 working days,&lt;/li&gt;\n &lt;li&gt;an Optus nbn HFC customer and fail to plug in your nbn equipment within 60 working days, from your nbn equipment delivery date, your order may be cancelled automatically.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;b&gt;Speed &amp;amp; Video Quality&lt;/b&gt;: Many factors affect speed and video quality such as internet traffic, your line condition, your hardware and software, the data source or destination, your location and the number of simultaneous video streams or other downloads you have running over your connection.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Optus supplied equipment&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Optus supplied modem:&lt;/b&gt;&lt;/p&gt;\n&lt;ul&gt;\n &lt;li&gt;The Optus supplied modem that you will receive will depend on the Home Internet plan you select. Each Optus supplied modem will have different functionality and features.&lt;/li&gt;\n &lt;li&gt;Your Optus supplied modem must only be used at your home broadband service address.&lt;/li&gt;\n &lt;li&gt;You must ensure your Optus supplied modem remains connected to your fixed line (for example, via the nbn™ network terminating device) and you must not otherwise knowingly or recklessly interfere with your Optus supplied modem or home wiring in a way that may disable your fixed line home internet or phone service.&lt;/li&gt;\n &lt;li&gt;If Optus provides an Optus Ultra WiFi Modem with your plan on a Device Payment Plan, Optus will cover the cost of the modem if you remain connected for 24 months.&lt;/li&gt;\n &lt;li&gt;The SIM supplied with the modem provides 4G Mobile Backup and must not be removed. The SIM will not work in any other device. &lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;b&gt;4G Mobile Backup:&lt;/b&gt;&lt;/p&gt;\n&lt;ul&gt;\n &lt;li&gt;Optus 4G mobile backup is a complimentary service that provides an interim broadband service using the Optus 4G plus network in &lt;a href=\&quot;/living-network/coverage\&quot;&gt;Optus 4G Coverage&lt;/a&gt; Areas only (4G backup service). It is only available using an Optus Ultra WiFi Modem with an Optus SIM on our network.&lt;/li&gt;\n &lt;li&gt;The 4G backup service is available for use from when you receive your Optus Ultra WiFi Modem until your nbn service is fully activated. The Optus 4G backup will also provide an interim broadband service during service faults.&lt;/li&gt;\n &lt;li&gt;The 4G backup service from the Optus Ultra WiFi Modem requires Optus 4G coverage. 4G backup speeds may vary and are limited to 25/5 Mbps.&lt;/li&gt;\n &lt;li&gt;&lt;b&gt;Service Limitations&lt;/b&gt;: Some services or service features may not work while the Optus Ultra WiFi Modem is using the mobile backup pathway. This includes but is not limited to (as applicable) the voice service, static IP, and any speed upgrade on your home / small business broadband service. While using the 4G backup pathway on your Optus Ultra WiFi Modem. The 4G backup service is limited to 30 consecutive days unless you contact Optus with a problem. If you don’t contact us, Optus may suspend the 4G backup service until the fixed connection is online.&lt;/li&gt;\n &lt;li&gt;&lt;b&gt;Data usage and speed&lt;/b&gt;: There are no data limits for the interim 4G backup service. The speed of the 4G backup pathway has been limited to a maximum line speed of 25 Mbps for downloads and 5 Mbps for uploads. Speeds are variable on the Optus 4G mobile network and will depend on a number of factors including congestion, location of the modem, local conditions, hardware, software, and general internet traffic.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;b&gt;Optus Ultra WiFi Booster:&lt;/b&gt;&lt;/p&gt;\n&lt;ul&gt;\n &lt;li&gt;You may have the option to purchase Optus Ultra WiFi Boosters separately to use with an existing eligible Optus Fixed internet plan or additional to any you already have (within a specified limit), in which case you can pay for the device outright (we’ll charge you on your next bill) or you can pay in monthly installations on a POT Device Payment Plan over a term of 12, 24 or 36 months (as selected by you). There is no monthly credit or subsidy applicable to Boosters purchased this way.&lt;/li&gt;\n &lt;li&gt;You must use a compatible Optus supplied modem with the Optus Ultra WiFi Booster for it to work properly.&lt;/li&gt;\n &lt;li&gt;The Optus Ultra WiFi Booster will support up to 200 connected devices.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;b&gt;Self-Supplied Modems&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;If you take up the option to bring your own modem (self-supplied modem) you acknowledge and agree that:&lt;/p&gt;\n&lt;ul&gt;\n &lt;li&gt;A phone service is not supported with this option, which means you won’t have access to a landline home phone service that you can use to make or receive calls or contact emergency services like 000.&lt;/li&gt;\n &lt;li&gt;It’s your responsibility to ensure your self-supplied modem is nbn compatible and can be used with the Optus nbn Internet Service.&lt;/li&gt;\n &lt;li&gt;Some Optus Network features and Optus equipment like the Optus supplied Boosters may not work with your self-supplied modem.&lt;/li&gt;\n &lt;li&gt;The 4G back up service that is provided with the Optus Ultra WiFi modem won’t be available.&lt;/li&gt;\n &lt;li&gt;If you add a Home Fast, Home Superfast or Ultrafast speed pack – these speed packs require equipment capable of achieving plan or speed pack speeds and we won’t know if your self-supplied modem is compatible or not.&lt;/li&gt;\n &lt;li&gt;Optus will only be able to provide you with general support for your service. We won’t be able to identify or fix faults related to your self-supplied modem, you’ll need to contact the manufacturer directly.&lt;/li&gt;\n &lt;li&gt;nbn® reserves the right to refuse to fix a fault where it considers a modem to be the cause or to suspend a service where it considers a modem to be unsupportable or a risk to the network.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;b&gt;Optus SubHub&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;Optus SubHub is a platform for you to manage a selection of your paid subscriptions with ease by uniting them together in one place.&lt;/p&gt;\n&lt;p&gt;Eligible Optus internet Plans include a SubHub Discount (available via Optus SubHub platform).&lt;/p&gt;\n&lt;p&gt;You must have an active SubHub account with a paid subscription cost greater than $0/mth to receive the Subhub discount up to $20/mth maximum. Any difference between total cost and the $20 is forfeited each month.&lt;/p&gt;\n&lt;ul&gt;\n &lt;li&gt;To activate, you will first need to set up a SubHub account via the SubHub platform using your MyAccount login credentials.&lt;/li&gt;\n &lt;li&gt;Optus is not able to activate your SubHub account. Your personal subscriptions in SubHub can only be privately managed by you. Accordingly, it is your responsibility to ensure you activate subscriptions to obtain the benefit of your Promo plan.&lt;/li&gt;\n &lt;li&gt;The pricing benefit of your Internet plan’s inclusion (if applicable) applies when you’ve received your modem and booster and your nbn service is operational (when you plug in the Optus supplied modem to connect it to the nbn network).&lt;/li&gt;\n &lt;li&gt;If you activate your SubHub account before you’ve received your modem and booster and your nbn service is operational, you will be separately charged by Optus until your nbn internet service becomes operational.&lt;/li&gt;\n &lt;li&gt;If you cancel an Internet plan that included a SubHub credit and you still have a SubHub account connected to an Optus Service (e.g. an Optus mobile service or you transfer to another Optus internet plan), then you will continue to be billed but won’t receive the additional entitlement as part of the plan you just cancelled.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;b&gt;Other Inclusions, optional add ons and services&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;There may be other special promotions, optional extras or subscriptions that you may access from time to time that are not set out here. Additional terms and conditions (including charges, changes and cancellation rights) may apply to such special promotions, optional extras and subscriptions.&lt;/p&gt;\n&lt;p&gt;Trademark notices&lt;/p&gt;\n&lt;p&gt;nbn®, NBN Co Limited and other nbn® logos and brands are trademarks of NBN Co Limited and used under licence.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Promo Plan Introductory Offer&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;$10 off eligible Optus nbn Promo Internet Plans over 12 months&lt;/b&gt;: If you sign up or recontract, to an eligible Optus nbn Promo plan, you will receive $10 off your plan access fee per month, for the first 12 months, and then pay the standard in-market plan fee thereafter. This is available to consumer and business customers with a valid ABN/ACN only. The offer is not available with any other offer, unless specified. The discount is forfeited if you recontract, change, or cancel your nbn plan.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Bundle Bonus&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;$15 discount for 12 months:&amp;nbsp;&lt;/b&gt;Available to customers with a connected eligible Mobile, Home internet or Data plan service (Primary Service) who sign up to any eligible new mobile, Home internet or Data plan service (Additional Service). Also available to customers who purchase a Primary Service and Additional Services in the same transaction. The $15 discount for 12 months applies to the standard monthly access fees on each Additional Service and reverts to standard in-market price on Additional Services after 12 months. The discount does not apply to any add-ons or linked device payments and is forfeited if you cancel, recontract or change your Additional Service to an ineligible plan. Offer available until withdrawn.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Get Optus Basic nbn for $49 a month for 6 months:&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;Available to eligible customers who sign up online to a new Optus Basic nbn plan. &lt;b&gt;New services only.&lt;/b&gt;&amp;nbsp; Not available in conjunction with Bundle Bonus discount, or any other offer unless specified. Discount is forfeited if you recontract, change, or cancel your Optus nbn Internet plan. Pricing reverts to the standard in-market plan fee after any promotions end. Online offer available until &lt;b&gt;28 April 2026.&lt;/b&gt;&lt;/p&gt;\n&lt;div&gt;\n &lt;div&gt;\n  &lt;b&gt;Get Optus Everyday nbn plan for $65 a month for 6 months:&lt;/b&gt;\n &lt;/div&gt;\n &lt;div&gt;&amp;nbsp;&lt;/div&gt;\n &lt;div&gt;\n  Available to eligible customers who sign up online to a new Optus Everyday nbn plan. &lt;b&gt;New services only.&lt;/b&gt;&amp;nbsp; Not available in conjunction with Bundle Bonus discount, or any other offer unless specified. Discount is forfeited if you recontract, change, or cancel your Optus nbn Internet plan. Pricing reverts to the standard in-market plan fee after any promotions end. Online offer available until &lt;b&gt;28 April 2026.&lt;/b&gt;\n &lt;/div&gt;\n &lt;div&gt;&amp;nbsp;&lt;/div&gt;\n &lt;div&gt;\n  &lt;div&gt;\n   &lt;b&gt;Get Optus Fast nbn plan for $69 a month for 6 months:&lt;/b&gt;\n  &lt;/div&gt;\n  &lt;div&gt;&amp;nbsp;&lt;/div&gt;\n  &lt;div&gt;\n   Available to eligible customers who sign up online to a new Optus Fast nbn plan. &lt;b&gt;New services only.&lt;/b&gt;&amp;nbsp; Not available in conjunction with Bundle Bonus discount, or any other offer unless specified. Discount is forfeited if you recontract, change, or cancel your Optus nbn Internet plan. Pricing reverts to the standard in-market plan fee after any promotions end. Online offer available until &lt;b&gt;28 April 2026.&lt;/b&gt;\n  &lt;/div&gt;\n  &lt;div&gt;&amp;nbsp;&lt;/div&gt;\n  &lt;div&gt;\n   &lt;b&gt;Get Optus Ultrafast nbn plan for $99 a month for 6 months:&lt;/b&gt;\n  &lt;/div&gt;\n  &lt;div&gt;&amp;nbsp;&lt;/div&gt;\n  &lt;div&gt;\n   Available to eligible customers who sign up online to a new Optus Ultrafast nbn plan. &lt;b&gt;New services only.&lt;/b&gt; Not available in conjunction with Bundle Bonus discount, or any other offer unless specified. Discount is forfeited if you recontract, change, or cancel your Optus nbn Internet plan. Pricing reverts to the standard in-market plan fee after any promotions end Online offer available until &lt;b&gt;28 April 2026.&lt;/b&gt;\n  &lt;/div&gt;\n  &lt;div&gt;&amp;nbsp;&lt;/div&gt;\n &lt;/div&gt;\n&lt;/div&gt;\n&lt;p&gt;The terms and conditions of these plans are set out at &lt;a href=\&quot;https://www.optus.com.au/standardagreements\&quot;&gt;optus.com.au/standardagreements&lt;/a&gt;.&lt;/p&gt;&quot;,&quot;alert_type&quot;:&quot;&quot;,&quot;tableClass&quot;:&quot;&quot;}" style="display:none">

                              <div class="lux-component-container" component="TextComponent" datamodel="{&quot;layout&quot;:{&quot;sm&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;desktopColumn&quot;:&quot;&quot;},&quot;md&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;phoneColumn&quot;:&quot;&quot;},&quot;la&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;tabletColumn&quot;:&quot;&quot;}},&quot;textId&quot;:&quot;_content_optus_en_for-you_internet_nbn_jcr_content_root_container_container_container_copy_responsive-container_responsive_container_1403362145_responsive-container_1712554614906a8fd2a63-7f06-4389-804c-494a38ca0afd_accordion_17125546149076b978204-24bf-4163-8fb8-415d88ef1b95_accordion_item_cmb_default_copy_574368610_text_optus_171255461490872b65399-21b3-4260-a5a8-4a0c11de04ca&quot;,&quot;isScroll&quot;:false,&quot;disableWarningAriaRole&quot;:false,&quot;text&quot;:&quot;&lt;p&gt;&lt;u&gt;Fibre to the Premises (FTTP)&lt;/u&gt;&lt;/p&gt;\n&lt;p&gt;FTTP is a term for the type of infrastructure used to connect your home or business to the internet. An nbn FTTP connection relies on a fibre optic line run from the nearest available node directly to your premises. Read &lt;a href=\&quot;/internet/articles/nbn-guide-connection-types\&quot; target=\&quot;_blank\&quot; role=\&quot;link\&quot; aria-label=\&quot;, opens in new tab\&quot;&gt;nbn Fibre to the Premises (FTTP) Explained&lt;/a&gt; to learn more.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/content/dam/optus/cloud/images/for-you/broadband/nbn/general/fibre-to-the-premises.version-1613953763394.jpg\&quot; alt=\&quot;\&quot; title=\&quot;FTTP nbn\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;&lt;u&gt;nbn Hybrid Fibre Coaxial (HFC)&lt;/u&gt;&lt;/p&gt;\n&lt;p&gt;nbn HFC, sometimes called nbn Cable, is a type of fixed line technology that can connect your premises to the nbn. A fibre cable is run to a nearby node, then existing cable TV wires complete the connection to your home. Read &lt;a href=\&quot;/internet/articles/nbn-guide-connection-types\&quot; target=\&quot;_blank\&quot; role=\&quot;link\&quot; aria-label=\&quot;, opens in new tab\&quot;&gt;nbn Cable (HFC) Explained&lt;/a&gt; to learn more.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/content/dam/optus/cloud/images/for-you/broadband/nbn/general/optus-cable.version-1613953900048.jpg\&quot; alt=\&quot;\&quot; title=\&quot;HFC nbn\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;&lt;u&gt;Fibre to the Node (FTTN)&lt;/u&gt;&lt;/p&gt;\n&lt;p&gt;Fibre to the Node (FTTN) enables data services and broadband connections to run via a central network box, which is referred to as a node. A fibre cable is run to a location on your street and then copper wiring connects you the rest of the way. Read &lt;a href=\&quot;/internet/articles/nbn-guide-connection-types\&quot; target=\&quot;_blank\&quot; role=\&quot;link\&quot; aria-label=\&quot;, opens in new tab\&quot;&gt;nbn Fibre to the Node (FTTN) Explained&lt;/a&gt; to learn more.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/content/dam/optus/cloud/images/for-you/broadband/nbn/general/fibre-to-the-node.version-1613953772255.jpg\&quot; alt=\&quot;FTTN nbn\&quot; title=\&quot;FTTN nbn\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;&lt;u&gt;Fibre to the Building (FTTB)&lt;/u&gt;&lt;/p&gt;\n&lt;p&gt;Fibre to the Basement (FTTB), sometimes called Fibre to the Building, is typically how larger buildings are connected on a fixed line to the nbn. A fibre cable connects to the building and then existing copper wiring is used the rest of the way. Read &lt;a href=\&quot;/internet/articles/nbn-guide-connection-types\&quot; role=\&quot;link\&quot; target=\&quot;_blank\&quot; aria-label=\&quot;, opens in new tab\&quot;&gt;nbn Fibre to the Basement (FTTB) Explained&lt;/a&gt; to learn more.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/content/dam/optus/cloud/images/for-you/broadband/nbn/general/fibre-to-the-building.version-1613953790447.jpg\&quot; alt=\&quot;FTTb nbn\&quot; title=\&quot;FTTb nbn\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;&lt;u&gt;Fibre to the Curb (FTTC)&lt;/u&gt;&lt;/p&gt;\n&lt;p&gt;A fibre cable is run close to your premises, usually the curb, and then copper wiring carries the connection the rest of the way. Read &lt;a href=\&quot;/internet/articles/nbn-guide-connection-types\&quot; target=\&quot;_blank\&quot; role=\&quot;link\&quot; aria-label=\&quot;, opens in new tab\&quot;&gt;nbn Fibre to the Curb (FTTC) Explained&lt;/a&gt; to learn more.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/content/dam/optus/cloud/images/for-you/broadband/nbn/general/nbn-fibre-to-the-curb.version-1613953795910.jpg\&quot; alt=\&quot;FTTC nbn\&quot; title=\&quot;FTTC nbn\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;&amp;nbsp;&lt;/p&gt;&quot;,&quot;alert_type&quot;:&quot;&quot;,&quot;tableClass&quot;:&quot;&quot;}" style="display:none">

s, could limit you from utilising your maximum speed of your internet plan.&lt;/p&gt;&quot;,&quot;alert_type&quot;:&quot;&quot;,&quot;tableClass&quot;:&quot;&quot;}" style="display:none">

                              <div class="lux-component-container" component="TextComponent" datamodel="{&quot;layout&quot;:{&quot;sm&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;desktopColumn&quot;:&quot;&quot;},&quot;md&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;phoneColumn&quot;:&quot;&quot;},&quot;la&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;tabletColumn&quot;:&quot;&quot;}},&quot;textId&quot;:&quot;_content_optus_en_for-you_internet_nbn_jcr_content_root_container_container_container_copy_responsive-container_responsive_container_1403362145_responsive-container_1712554614906a8fd2a63-7f06-4389-804c-494a38ca0afd_accordion_1712554614910f805e6e4-0d3b-4615-8bac-fb681fd69013_accordion_item_cmb_default_copy_text_optus_17125546149119e0bb974-cb16-4c51-80d7-73a807cd2af7&quot;,&quot;isScroll&quot;:false,&quot;disableWarningAriaRole&quot;:false,&quot;text&quot;:&quot;&lt;p&gt;&lt;b&gt;If I signed up to one of the current standalone fixed line Internet plans (e.g. Everyday plan, or Fast plan), can I add a phone line to my plan?&amp;nbsp;&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;With the Everyday and Fast plans, yes you will have the option to add an Optus Plus Phone Extra service.&amp;nbsp;&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;I have added a phone service to my Internet plan, when will my phone line be available?&amp;nbsp;&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;Your phone line should be available within 24-48 hours. Please note that by accepting the benefits of this offer, you accept and agree that the connection date for your phone will likely be longer than the maximum timeframe stated in the Customer Service Guarantee (CSG). Apart from this, any other rights you have under the CSG still apply. For more information, see&amp;nbsp;&lt;a href=\&quot;http://optus.com.au/yourCSG\&quot; target=\&quot;_blank\&quot; aria-label=\&quot;, opens in new tab\&quot; rel=\&quot;noopener noreferrer\&quot; style=\&quot;background-color: rgb(255, 255, 255);\&quot;&gt;Optus.com.au/yourCSG&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;I was in a 24 month contract that has since ended, can I change to the new month to month plans with no extra cost?&amp;nbsp;&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;Yes, there is no recontracting fee if you are no longer in a contract.&amp;nbsp;&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;How long will the Optus Ultra WiFi Modem take to switch over to the 4G backup network?&amp;nbsp;&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;During broadband service faults, the switch over to the mobile backup interim service takes approximately one to six minutes.&amp;nbsp;&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;I have agreed to connecting to nbn® without a confirmed line speed before activation, will Optus still test my line speed and contact me with alternate options?&amp;nbsp;&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;Yes, all FTTN, FTTB and FTTC services with an unconfirmed speed will be tested after activation.&amp;nbsp;&amp;nbsp;&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;How do I add an additional speed pack to my existing Optus Internet plan?&amp;nbsp;&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;Please see the “How to add or remove Cable &amp;amp; NBN Broadband Speed Packs” support page at:&amp;nbsp;&lt;a href=\&quot;https://www.optus.com.au/for-you/support/answer?id=2149\&quot; target=\&quot;_blank\&quot; aria-label=\&quot;, opens in new tab\&quot; rel=\&quot;noopener noreferrer\&quot; style=\&quot;background-color: rgb(255, 255, 255);\&quot;&gt;https://www.optus.com.au/for-you/support/answer?id=2149&lt;/a&gt;, for more information.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;I currently have a Fetch Mini or Fetch Mighty included in my plan, can I keep Fetch if I switch to a new plan?&amp;nbsp;&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;Yes, you can. You will need to switch your existing Fetch service to a standalone plan. You can use the chat function on My Optus App or speak with one of our friendly staff members in store. Alternatively, contact us on 1300 101 693.&amp;nbsp;&lt;/p&gt;&quot;,&quot;alert_type&quot;:&quot;&quot;,&quot;tableClass&quot;:&quot;&quot;}" style="display:none">

                         <div id="_content_optus_en_for-you_internet_nbn_jcr_content_root_container_container_container_copy_responsive-container_responsive_container_1403362145_responsive-container_1712554614906a8fd2a63-7f06-4389-804c-494a38ca0afd_accordion_1712554614910f805e6e4-0d3b-4615-8bac-fb681fd69013_accordion_item_cmb_default_copy_574368610">
                          <div class="lux-component-container" component="AccordionVerticalItem" datamodel="{&quot;text&quot;:{&quot;title&quot;:&quot;Optus Ultra WiFi Booster&quot;,&quot;Properties&quot;:[]},&quot;open&quot;:false,&quot;wrapperTitle&quot;:&quot;&lt;div class='cmb-title sd-component-text-title sd-component-standard-text-base sd-component-text-base sd-component-base'&gt;Optus Ultra WiFi Booster&lt;/div&gt;&quot;,&quot;hashId&quot;:null,&quot;layout&quot;:{&quot;sm&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;&quot;,&quot;bottom&quot;:&quot;&quot;}},&quot;md&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;&quot;,&quot;bottom&quot;:&quot;&quot;}},&quot;la&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;&quot;,&quot;bottom&quot;:&quot;&quot;}}}}" style="display:none">
                           <div>
                            <div class="aem-Grid aem-Grid--12 aem-Grid--default--12">
                             <div class="aem-GridColumn aem-GridColumn--default--12">
                              <div id="_content_optus_en_for-you_internet_nbn_jcr_content_root_container_container_container_copy_responsive-container_responsive_container_1403362145_responsive-container_1712554614906a8fd2a63-7f06-4389-804c-494a38ca0afd_accordion_1712554614910f805e6e4-0d3b-4615-8bac-fb681fd69013_accordion_item_cmb_default_copy_574368610_text_optus_171255461491171e6dbae-fb2d-46d7-ad3e-6c4a855de38d">
                              <div class="lux-component-container" component="TextComponent" datamodel="{&quot;layout&quot;:{&quot;sm&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;desktopColumn&quot;:&quot;&quot;},&quot;md&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;phoneColumn&quot;:&quot;&quot;},&quot;la&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;tabletColumn&quot;:&quot;&quot;}},&quot;textId&quot;:&quot;_content_optus_en_for-you_internet_nbn_jcr_content_root_container_container_container_copy_responsive-container_responsive_container_1403362145_responsive-container_1712554614906a8fd2a63-7f06-4389-804c-494a38ca0afd_accordion_1712554614910f805e6e4-0d3b-4615-8bac-fb681fd69013_accordion_item_cmb_default_copy_574368610_text_optus_171255461491171e6dbae-fb2d-46d7-ad3e-6c4a855de38d&quot;,&quot;isScroll&quot;:false,&quot;disableWarningAriaRole&quot;:false,&quot;text&quot;:&quot;&lt;p&gt;&lt;b&gt;I have a large house, can I take more than one booster?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;Yes, whilst one booster is generally enough for most households, you do have the choice to add up to 3 boosters in total. Boosters have an extra cost associated with them and can be purchased on a 1, 12, 24 or 36 months Pay Over Time basis. If you’d like to know more please &lt;a href=\&quot;/support\&quot; target=\&quot;_blank\&quot;&gt;chat with us&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;What modems can I use the booster with?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;The Optus Ultra WiFi Booster Gen 2 will work with the Optus Ultra WiFi Gen 2 Modem.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Where should I place my Optus Ultra WiFi Booster for best results?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;You should place your booster somewhere elevated off the ground and away from other sources of interference, such as microwaves or refrigerators.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Can I pay for my Optus Ultra WiFi Booster in store?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;Unfortunately, no. If you wish to pay for your booster outright, the cost will be applied to your next bill.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Is the Optus Ultra WiFi Booster right for me?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;If you are experiencing areas in your house that have limited or poor WiFi coverage then you should consider adding one or more boosters to help you get better coverage and reduce WiFi blackspots within your home.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;I set up the Optus Ultra WiFi Booster, now some of my devices can’t connect to the internet at all anymore, why?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;If you previously had devices connected to 5GHz band, you may need to reconnect them to your WiFi after your Booster has been connected. This is due to the enablement of Band Steering on your modem. Band Steering selects the best band based on the needs of each device. See ‘What is Band Steering?’ and ‘How does Band Steering work?’ below for more information.&lt;/p&gt;\n&lt;p&gt;To reconnect your devices to your WiFi, use the WiFi login details printed on your modem label or Optus supplied fridge magnet. If you had previously customised your WiFi name or passphrase for the 2.4GHz band, this will still be your WiFi login, so do not use the old login that’s printed on the modem label or fridge magnet.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;What is Band Steering?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;Dual band modems like the Optus-supplied modems run two different frequency bands. The two bands have a signal of 2.4GHz or 5GHz. The difference between the two bands are: &lt;/p&gt;\n&lt;p&gt;-&amp;nbsp; 2.4GHz has a longer range so it can cover more of an area. However it is slower and is more susceptible to interference from certain household appliances such as microwaves, cordless phones, Bluetooth devices or even your neighbours’ WiFi networks. &lt;/p&gt;\n&lt;p&gt;-&amp;nbsp; 5GHz is faster than 2.4GHz, less susceptible to interference and is better for real-time apps and gaming. However, it has a shorter range than the 2.4GHz band. &lt;/p&gt;\n&lt;p&gt;When Band Steering is enabled, your modem will always try to connect you to the 5GHz band provided the signal strength is good and your device has 5GHz capability. To enable Band Steering you must have Single SSID enabled. See “What is a Single SSID?” below for more information.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;How does Band Steering work?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;Your WiFi enabled devices at home such as your laptop, smart phone, smart speakers all look for WiFi networks. Depending on the age or type of these devices, they may only support the 2.4GHz frequency. &lt;/p&gt;\n&lt;p&gt;Knowing what band is best for you to connect your device to can be difficult. This is where Band Steering from your Optus modem comes in. Band Steering will talk to your device to check the signal strength and if the device supports the 5GHz band. If signal strength is good and 5GHz is supported, it will connect to that frequency. If 5GHz is not supported or if the signal strength is poor, it will connect to 2.4GHz instead. &lt;/p&gt;\n&lt;p&gt;For example, if you have a new laptop and you connect it to the WiFi, Band Steering will automatically connect your laptop to the 5GHz frequency. Alternatively, if you have purchased some smart light bulbs for your home, these lights may only support 2.4GHz, so Band Steering will select this frequency, rather than trying to connect to 5GHz only for the connection fail.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Why can I only see one WiFi band? I thought most modems have two.&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;Optus has updated our WiFi modems to include Single SSID (see ‘What is SSID?’ below). This eliminates the need to have two WiFi bands. Smart Band Steering helps manage your devices by automatically selecting the WiFi band that works best for each device and will swap bands when it needs to.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;What is Single SSID?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;The Optus Ultra WiFi Booster uses Single SSID (SSID stands for Service Set Identifier). Commonly, SSID refers to the WiFi network you connect your devices to when connecting to the internet. &lt;/p&gt;\n&lt;p&gt;Most modems today are dual band modems meaning they have two frequencies, 2.4GHz and a 5Ghz. With most dual band modems, when you go to connect your devices you will see two SSIDs, for example MyOptusModem and MyOptusModem_5GHz. Single SSID combines both these WiFi names into one and allows for Band Steering to be enabled. &lt;/p&gt;\n&lt;p&gt;When you connect to the Single SSID, the modem or booster will automatically connect your device to the best frequency band, usually based on signal strength via the Band Steering function. See ‘What is Band Steering?’ and ‘How does Band Steering work?’ above for more information.&lt;/p&gt;&quot;,&quot;alert_type&quot;:&quot;&quot;,&quot;tableClass&quot;:&quot;&quot;}" style="display:none">

                              <div id="_content_optus_en_for-you_internet_nbn_jcr_content_root_container_container_container_copy_responsive-container_responsive_container_1403362145_responsive-container_1712554614906a8fd2a63-7f06-4389-804c-494a38ca0afd_accordion_1712554614910f805e6e4-0d3b-4615-8bac-fb681fd69013_accordion_item_cmb_default_copy_574_1588539529_text_optus_17125546149123335d7b8-4100-47a4-bf8c-52e5357197f1">
                              <div class="lux-component-container" component="TextComponent" datamodel="{&quot;layout&quot;:{&quot;sm&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;desktopColumn&quot;:&quot;&quot;},&quot;md&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;phoneColumn&quot;:&quot;&quot;},&quot;la&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;tabletColumn&quot;:&quot;&quot;}},&quot;textId&quot;:&quot;_content_optus_en_for-you_internet_nbn_jcr_content_root_container_container_container_copy_responsive-container_responsive_container_1403362145_responsive-container_1712554614906a8fd2a63-7f06-4389-804c-494a38ca0afd_accordion_1712554614910f805e6e4-0d3b-4615-8bac-fb681fd69013_accordion_item_cmb_default_copy_574_1588539529_text_optus_17125546149123335d7b8-4100-47a4-bf8c-52e5357197f1&quot;,&quot;isScroll&quot;:false,&quot;disableWarningAriaRole&quot;:false,&quot;text&quot;:&quot;&lt;p&gt;&lt;b&gt;How does the Optus automatic payment plan work?&lt;/b&gt;\n &lt;br&gt;\n &lt;br&gt;\n Our Internet plans are sold on a subscription basis that have a set monthly payment amount to avoid any 'bill shock'. Simply choose your plan and set up your automatic monthly payment (i.e. direct debit) by credit, debit or charge card (automatic payment from a bank account is not permitted).\n &lt;br&gt;\n &lt;br&gt;\n Your monthly charge(s) will be automatically paid on an upfront basis using your automatic payment from your nominated credit, debit or charge card. An electronic tax invoice will be available once your payment has been processed and you will not receive a monthly bill.\n &lt;br&gt;\n &lt;br&gt;\n We do not provide any paper invoices or bills for our plans. You'll be able to manage your payment details, view your upcoming and past payments and check usage information in MyAccount or My Optus app. &lt;/p&gt;\n&lt;p&gt;&lt;b&gt;What happens if my payment fails?&lt;/b&gt;\n &lt;br&gt;\n &lt;br&gt;\n If your automatic payment fails, we will send you a friendly reminder to check your payment details are correct and sufficient funds are available. If payment is still not received, your service may be restricted or cancelled.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Where can I access my tax invoices and update payment details?&lt;/b&gt;\n &lt;br&gt;\n &lt;br&gt;\n You'll be able to manage your payment details and view your upcoming and past payments via My Account or My Optus app.&lt;/p&gt;&quot;,&quot;alert_type&quot;:&quot;&quot;,&quot;tableClass&quot;:&quot;&quot;}" style="display:none">

                          <div class="lux-component-container" component="AccordionVerticalItem" datamodel="{&quot;text&quot;:{&quot;title&quot;:&quot;CSG Waiver&quot;,&quot;Properties&quot;:[]},&quot;open&quot;:false,&quot;wrapperTitle&quot;:&quot;&lt;div class='cmb-title sd-component-text-title sd-component-standard-text-base sd-component-text-base sd-component-base'&gt;CSG Waiver&lt;/div&gt;&quot;,&quot;hashId&quot;:null,&quot;layout&quot;:{&quot;sm&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;&quot;,&quot;bottom&quot;:&quot;&quot;}},&quot;md&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;&quot;,&quot;bottom&quot;:&quot;&quot;}},&quot;la&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;&quot;,&quot;bottom&quot;:&quot;&quot;}}}}" style="display:none">
                           <div>
                            <div class="aem-Grid aem-Grid--12 aem-Grid--default--12">
                             <div class="aem-GridColumn aem-GridColumn--default--12">
                              <div id="_content_optus_en_for-you_internet_nbn_jcr_content_root_container_container_container_copy_responsive-container_responsive_container_1403362145_responsive-container_1712554614906a8fd2a63-7f06-4389-804c-494a38ca0afd_accordion_1712554614910f805e6e4-0d3b-4615-8bac-fb681fd69013_accordion_item_cmb_default_copy_574_397213576_text_optus_1712554614912bae90681-95b2-4b18-a170-a7250f4b230f">
                              <div class="lux-component-container" component="TextComponent" datamodel="{&quot;layout&quot;:{&quot;sm&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;desktopColumn&quot;:&quot;&quot;},&quot;md&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;phoneColumn&quot;:&quot;&quot;},&quot;la&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;tabletColumn&quot;:&quot;&quot;}},&quot;textId&quot;:&quot;_content_optus_en_for-you_internet_nbn_jcr_content_root_container_container_container_copy_responsive-container_responsive_container_1403362145_responsive-container_1712554614906a8fd2a63-7f06-4389-804c-494a38ca0afd_accordion_1712554614910f805e6e4-0d3b-4615-8bac-fb681fd69013_accordion_item_cmb_default_copy_574_397213576_text_optus_1712554614912bae90681-95b2-4b18-a170-a7250f4b230f&quot;,&quot;isScroll&quot;:false,&quot;disableWarningAriaRole&quot;:false,&quot;text&quot;:&quot;&lt;p&gt;&lt;b&gt;What is the Customer Service Guarantee (CSG) Standard?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;The Customer Service Guarantee Standard (CSG Standard) is an industry regulation that protects consumer customers from poor service. It includes a set of performance standards relating to connection, repair and appointment timeframes that Optus and other providers must meet when providing a standard telephone service to consumer customers with up to 5 fixed-line telephony services. &lt;/p&gt;\n&lt;p&gt;&lt;b&gt;What is the CSG Waiver?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;The CSG Standard includes rules that a Carriage Service Provider must follow to allow for a customer to waive some or all of their protections under the Standard (CSG Waiver). From 12 September 2022, Optus has required customers to consent to a CSG Waiver prior to purchasing a fixed-line telephone service, in exchange for a better value service. The rights, protections and performance standards generally provided under the CSG that will be waived include: &lt;/p&gt;\n&lt;ul&gt;\n &lt;li&gt;maximum timeframes for the connection of a standard telephone service and/or any enhanced call features;&lt;/li&gt;\n &lt;li&gt;maximum timeframes for the fixing of a fault with your standard telephone service and/or any enhanced call features;&lt;/li&gt;\n &lt;li&gt;timeframes for attending connection or fault fix appointments;&lt;/li&gt;\n &lt;li&gt;provision of information to you about these performance standards; and&lt;/li&gt;\n &lt;li&gt;prescribed compensation payable to customers if we are unable to meet these performance standards. &lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;b&gt;How will the CSG Waiver apply?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;Any customer who signs up or recontracts to an Optus standard telephone service will be required to consent to the CSG Waiver as a precondition to that purchase. &lt;/p&gt;\n&lt;p&gt;&lt;b&gt;What does the CSG Waiver mean for how we support Optus customers?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;The CSG Waiver doesn't mean that we are not committed to providing you with the best customer service we can. As always, we'll endeavour to connect your service or fix any issues you have as fast as we can, with the best service possible. &lt;/p&gt;\n&lt;p&gt;&lt;b&gt;What if I don't want to consent to the Customer Service Guarantee (CSG) Waiver?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;You don't have to agree to the CSG Waiver, but if you don't or if you withdraw consent within your cooling off period, then we'll decline to supply you with the Optus telephone service you ordered.&lt;/p&gt;\n&lt;p&gt;You can still place an order for an internet service without telephony or an alternate product from us. You won't be able to place an order for Optus internet service with telephony without consenting to the CSG waiver.&lt;/p&gt;&quot;,&quot;alert_type&quot;:&quot;&quot;,&quot;tableClass&quot;:&quot;&quot;}" style="display:none">

                          <div class="lux-component-container" component="AccordionVerticalItem" datamodel="{&quot;text&quot;:{&quot;title&quot;:&quot;BYO modem&quot;,&quot;Properties&quot;:[]},&quot;open&quot;:false,&quot;wrapperTitle&quot;:&quot;&lt;div class='cmb-title sd-component-text-title sd-component-standard-text-base sd-component-text-base sd-component-base'&gt;BYO modem&lt;/div&gt;&quot;,&quot;hashId&quot;:null,&quot;layout&quot;:{&quot;sm&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;&quot;,&quot;bottom&quot;:&quot;&quot;}},&quot;md&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;&quot;,&quot;bottom&quot;:&quot;&quot;}},&quot;la&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;&quot;,&quot;bottom&quot;:&quot;&quot;}}}}" style="display:none">

                             <div class="aem-GridColumn aem-GridColumn--default--12">
                              <div id="_content_optus_en_for-you_internet_nbn_jcr_content_root_container_container_container_copy_responsive-container_responsive_container_1403362145_responsive-container_1712554614906a8fd2a63-7f06-4389-804c-494a38ca0afd_accordion_1712554614910f805e6e4-0d3b-4615-8bac-fb681fd69013_accordion_item_cmb_default_copy_574_706905277_text_optus_17125546149137b1a9026-a486-482d-b84b-4e2587e20b44">
                              <div class="lux-component-container" component="TextComponent" datamodel="{&quot;layout&quot;:{&quot;sm&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;desktopColumn&quot;:&quot;&quot;},&quot;md&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;phoneColumn&quot;:&quot;&quot;},&quot;la&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;v-p-small-bottom&quot;},&quot;tabletColumn&quot;:&quot;&quot;}},&quot;textId&quot;:&quot;_content_optus_en_for-you_internet_nbn_jcr_content_root_container_container_container_copy_responsive-container_responsive_container_1403362145_responsive-container_1712554614906a8fd2a63-7f06-4389-804c-494a38ca0afd_accordion_1712554614910f805e6e4-0d3b-4615-8bac-fb681fd69013_accordion_item_cmb_default_copy_574_706905277_text_optus_17125546149137b1a9026-a486-482d-b84b-4e2587e20b44&quot;,&quot;isScroll&quot;:false,&quot;disableWarningAriaRole&quot;:false,&quot;text&quot;:&quot;&lt;p&gt;&lt;b&gt;What level of technical support can I expect from Optus if I chose to supply my own modem?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;Optus will provide some support should you encounter any technical difficulties with your self-supplied modem. This will include ensuring there are no network related faults that might influence your experience as well as some basic troubleshooting on your particular modem to ensure no obvious causes for the issue experienced. Optus won’t be able to identify or fix faults related to your self-supplied modem, you’ll need to contact the manufacturer directly.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;If I am not technically savvy, can I still choose to take up the option to supply my own modem?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;If you’re not familiar or confident with how to configure your device settings, Optus encourages you to take up a plan that comes with an Optus supplied modem so that you can enjoy the simplicity of “plug and play” convenience. In addition, you’ll get peace of mind from 4G back-up. &lt;/p&gt;\n&lt;p&gt;&lt;b&gt;If I find that my BYO modem is not working, can I take an Optus device at a later date?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;Yes, simply contact Optus and we’ll help you choose a new plan with an Optus Ultra WiFi Modem included - the cost of the modem will be covered if you stay connected on this plan for 24 months.&amp;nbsp; If you suspect your existing modem is incompatible or damaged, we recommend that you take up a plan that comes with an Optus modem, so you can enjoy the simplicity of “plug and play” convenience and peace of mind from 4G back-up to keep you connected and doing the things you love and enjoy online.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Can Optus advise what I should be looking for if I want to supply my own nbn® modem?&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;Optus recommends any customer who wants to use their own modem with an eligible Optus nbn plan to ensure firstly that the modem is nbn compatible and secondly that the modem supports DHCP device settings. Optus is unable to advise on whether a particular BYO modem satisfies either of those two conditions.&lt;/p&gt;&quot;,&quot;alert_type&quot;:&quot;&quot;,&quot;tableClass&quot;:&quot;&quot;}" style="display:none">

                   <div class="aem-Grid aem-Grid--12 aem-Grid--default--12  aem-Grid--tablet--12 aem-Grid--phone--12">

                            <div class="lux-component-container" component="TextComponent" datamodel="{&quot;layout&quot;:{&quot;sm&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;none&quot;}},&quot;md&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;none&quot;}},&quot;la&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-small-top&quot;,&quot;bottom&quot;:&quot;none&quot;}}},&quot;textId&quot;:&quot;_content_experience-fragments_optus_en_site_for-you_broadband-nbn_home-broadband_plans_overlays_optus-ultra-modem_master_jcr_content_root_overlay_17125546152361a55fd8e-b390-486b-b087-b95269671e96_modal_responsive_container_text_optus_171255461&quot;,&quot;isScroll&quot;:false,&quot;disableWarningAriaRole&quot;:false,&quot;text&quot;:&quot;&lt;p&gt;Pay $0 for our Ultra WiFi Modem Gen 2 when you stay connected for 24 months (normally $306). That's a $12.75/month credit on the modem for each month you stay connected. If you cancel before 24 months, you'll need to pay out any remaining cost of the modem, e.g. if you cancelled with 12 months remaining, you'd need to pay $153 ($12.75/month x 12 months remaining).&lt;/p&gt;\n&lt;p&gt;&lt;sup&gt;1&lt;/sup&gt; Excludes electronic components&lt;/p&gt;\n&lt;p&gt;&lt;span style=\&quot;letter-spacing: 0.16px;\&quot;&gt;&lt;a href=\&quot;https://www.optus.com.au/for-you/support/answer?id=5429\&quot; target=\&quot;_blank\&quot;&gt;&lt;u&gt;&lt;span style=\&quot;color: #000000;\&quot;&gt;More help on modem setup&lt;/span&gt;&lt;/u&gt;&lt;/a&gt;&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;&amp;nbsp;&lt;/p&gt;\n&lt;h5&gt;&lt;span style=\&quot;font-weight: normal;\&quot;&gt;150% faster speed&lt;/span&gt;&lt;/h5&gt;\n&lt;p&gt;Enjoy seriously fast WiFi speeds on even more devices with our most advanced modem yet. The modem delivers speeds up to 150% faster. (Based on comparison with Optus Ultra WiFi (Gen 1) modem. Actual speeds may vary and are limited by the plan speed).&lt;/p&gt;\n&lt;h5&gt;&lt;span style=\&quot;font-weight: normal;\&quot;&gt;WiFi 6 for reliability&lt;/span&gt;&lt;/h5&gt;\n&lt;p&gt;Get stronger, more reliable coverage in your home with the latest WiFi 6 technology. Plus, you can plug &amp;amp; play and have a backup connection from our 4G Network if your nbn connection ever falters. (4G backup requires Optus 4G coverage. 4G backup speeds may vary and are limited to 25/5Mbps).&lt;/p&gt;\n&lt;h5&gt;&lt;span style=\&quot;font-weight: normal;\&quot;&gt;128 connected devices&lt;/span&gt;&lt;/h5&gt;\n&lt;p&gt;Now you can power 2x more devices at once with our Optus Ultra WiFi Modem Gen 2. From Ultra HD TVs and gaming consoles to smart appliances, up to 128 on the same network.&lt;/p&gt;\n&lt;h5&gt;&lt;span style=\&quot;font-weight: normal;\&quot;&gt;4G Backup&lt;/span&gt;&lt;/h5&gt;\n&lt;p&gt;Experience more reliable home internet. The Optus Ultra WiFi Modem ensures that you're always online thanks to Optus Connect Protect, a failsafe that automatically connects to the &lt;a href=\&quot;/living-network/coverage\&quot; target=\&quot;_blank\&quot;&gt;Optus 4G network&lt;/a&gt; if there's a problem with your home nbn connection. Requires &lt;a href=\&quot;/living-network/coverage\&quot; target=\&quot;_blank\&quot;&gt;Optus 4G coverage&lt;/a&gt;. 4G speeds are variable and limited to 25/5 Mbps.&lt;/p&gt;\n&lt;p&gt;&amp;nbsp;&lt;/p&gt;&quot;,&quot;alert_type&quot;:&quot;&quot;,&quot;tableClass&quot;:&quot;&quot;}" style="display:none">

ck the “Don’t upgrade” tab now and select an eligible plan from there – you can then request the upgrade at any time afterwards simply by getting in touch with us via web chat.&lt;/p&gt;\n&lt;p&gt;&amp;nbsp;&lt;/p&gt;\n&lt;h3 class=\&quot;h4-style\&quot;&gt;What happens during the upgrade?&lt;/h3&gt;\n&lt;p&gt;An nbn technician will come to your home and install equipment both inside and outside your property.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/content/dam/optus/cloud/images/for-you/broadband/nbn/fca/fca-popup-one.version-1733877869148.png\&quot; alt=\&quot;\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;&amp;nbsp;&lt;/p&gt;\n&lt;h3 class=\&quot;h4-style\&quot;&gt;Where is the equipment installed?&lt;/h3&gt;\n&lt;p&gt;Your nbn technician will recommend options for optimal placement of the nbn equipment in your home on the day of installation.&lt;/p&gt;&quot;,&quot;alert_type&quot;:&quot;&quot;,&quot;tableClass&quot;:&quot;&quot;}" style="display:none">

                         <div class="lux-component-container" component="TextComponent" datamodel="{&quot;layout&quot;:{&quot;sm&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-normal-bottom&quot;,&quot;bottom&quot;:&quot;v-p-normal-bottom&quot;}},&quot;md&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-normal-bottom&quot;,&quot;bottom&quot;:&quot;v-p-normal-bottom&quot;}},&quot;la&quot;:{&quot;padding&quot;:{&quot;top&quot;:&quot;v-p-normal-bottom&quot;,&quot;bottom&quot;:&quot;v-p-normal-bottom&quot;}}},&quot;textId&quot;:&quot;_content_experience-fragments_optus_en_site_for-you_broadband-nbn_home-broadband_plans_overlays_modem-overlays_master_jcr_content_root_overlay_1712554620371c1b7f271-5a29-480e-9261-b8cefe31ea64_modal_text_optus_171255462037275e622d3-1f54-418f-a4c8-839a55dbf3ee&quot;,&quot;isScroll&quot;:false,&quot;disableWarningAriaRole&quot;:false,&quot;text&quot;:&quot;&lt;h2 class=\&quot;h4-style\&quot;&gt;More information on BYO modem setup&lt;/h2&gt;\n&lt;p&gt;It is assumed that you have checked and confirmed that your self-supplied modem (BYO modem) to be used with this plan is suitable for the nbn and is a relatively recent model.&lt;/p&gt;\n&lt;p&gt;Make sure your BYO modem can be configured for DHCP. If you have an nbn FTTN or FTTB connection, ensure the WAN interface of your modem matches what is required for your Optus nbn service&amp;nbsp; and you will need a VSDL2 WAN port and Telephone cable.&lt;/p&gt;\n&lt;p&gt;For all other nbn service types (i.e. FTTN, FTTP and HFC), a Modem with ethernet WAN port and cable is required.&amp;nbsp;&amp;nbsp;&lt;/p&gt;\n&lt;p&gt;&lt;span style=\&quot;color: rgb(0,164,173);\&quot;&gt;&lt;b&gt;Checklist to ensure best performance / recommended set-up.&lt;/b&gt;&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;1. Check the modem is undamaged and less than 5 years old.\n &lt;br&gt;\n 2. Check the modem has a power supply connected to a wall powerpoint rather than an extension or board.\n &lt;br&gt;\n 3. Check you have the necessary&amp;nbsp;cables&amp;nbsp;to connect to the nbn equipment and other devices.\n &lt;br&gt;\n 4. Check your brand/model can be configured to connect using DHCP\n &lt;br&gt;\n &amp;nbsp; &amp;nbsp; a.&amp;nbsp;Look for the maker and model number on your BYO modem.\n &lt;br&gt;\n &amp;nbsp; &amp;nbsp; b.&amp;nbsp;If required, use a search engine to find the user manual or guide for your BYO modem as this will usually have instructions on how to change DHCP settings.\n &lt;br&gt;\n 5. Ensure you can connect to your modem either by\n &lt;br&gt;\n &amp;nbsp; &amp;nbsp; a. Ethernet cable between your device and modem\n &lt;br&gt;\n &amp;nbsp; &amp;nbsp; b. WiFi connection on your device directly to the modem&lt;/p&gt;\n&lt;p&gt;\n &lt;br&gt;\n &lt;b style=\&quot;color: inherit; font-size: inherit; text-align: inherit;\&quot;&gt;&lt;span style=\&quot;color: rgb(0,164,173);\&quot;&gt;Network settings for your BYO Modem.&lt;/span&gt;&lt;/b&gt;\n &lt;br&gt;\n&lt;/p&gt;\n&lt;p&gt;To access and configure your network settings&amp;nbsp;, you'll need to login to your BYO modem or router's default gateway server. Please check your User Guide for details on how to access your network settings before you configure your BYO modem.&lt;/p&gt;\n&lt;p&gt;&lt;b&gt;Here's how your BYO modem general network DHCP settings should be configured.&lt;/b&gt;&lt;/p&gt;\n&lt;p&gt;1. Set the Network Connection Type to IPoE. For some modems or routers, this is referred to as either DHCP or Dynamic IP and is the default setting.\n &lt;br&gt;\n 2. If you are connecting to FTTN or FTTB, set the DSL Modulation type in your modem settings to VDSL2 or Auto-sync Up with DHCP / IPoE.\n &lt;br&gt;\n 3. Set the L2 Maximum Transfer Unit (MTU) size to 1500 Bytes. Don't set it any higher as this can affect the performance of your nbn™ service.\n &lt;br&gt;\n 4. Set the Upstream Maximum Bit Rate (MBR) to the uplink speed profile of the nbn™ service that you're subscribed to. For example, set the uplink MBR to 20 Mbps for a 100/20 speed pack or plan.\n &lt;br&gt;\n 5.&amp;nbsp;As soon as you establish internet access on the modem, follow the BYO modem user guide or manual to upgrade the modem to the latest firmware version available.&lt;/p&gt;&quot;,&quot;alert_type&quot;:&quot;&quot;,&quot;tableClass&quot;:&quot;&quot;}" style="display:none">
