<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISP Plan Scraper Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        .panel {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .panel h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .provider-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .provider-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #ddd;
            transition: all 0.3s ease;
        }

        .provider-item.has-data {
            border-left-color: #28a745;
            background: #e8f5e9;
        }

        .provider-item.blocked {
            border-left-color: #dc3545;
            background: #ffebee;
        }

        .provider-info h3 {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .provider-status {
            font-size: 0.85em;
            color: #666;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.85em;
        }

        .scrape-controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .results-section {
            margin-top: 30px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .plans-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .plans-table th,
        .plans-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }

        .plans-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .plans-table tr:hover {
            background: #f8f9fa;
        }

        .download-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .provider-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌐 ISP Plan Scraper Dashboard</h1>
            <p class="subtitle">Scrape and analyze internet plans from Australian ISPs</p>
        </header>

        <div class="dashboard">
            <!-- Left Panel: Provider Selection -->
            <div class="panel">
                <h2>Providers</h2>
                <div id="provider-list" class="provider-list">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading providers...</p>
                    </div>
                </div>

                <div class="scrape-controls">
                    <button class="btn btn-primary" onclick="scrapeAll()">
                        Scrape All
                    </button>
                    <button class="btn btn-secondary" onclick="loadAllResults()">
                        Load Saved Data
                    </button>
                </div>
            </div>

            <!-- Right Panel: Results -->
            <div class="panel">
                <h2>Results</h2>
                
                <div id="stats-bar" class="stats-bar hidden">
                    <div class="stat-card">
                        <div class="stat-value" id="total-providers">0</div>
                        <div class="stat-label">Providers</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="total-plans">0</div>
                        <div class="stat-label">Total Plans</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="price-range">$0</div>
                        <div class="stat-label">Price Range</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="speed-range">0</div>
                        <div class="stat-label">Speed Range</div>
                    </div>
                </div>

                <div id="results-content">
                    <div class="loading">
                        <p>Select a provider and click "Scrape" or "Load Saved Data"</p>
                    </div>
                </div>

                <div id="download-section" class="download-buttons hidden">
                    <button class="btn btn-success btn-small" onclick="downloadJSON()">
                        📥 Download JSON
                    </button>
                    <button class="btn btn-success btn-small" onclick="downloadCSV()">
                        📥 Download CSV
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentProvider = null;
        let allResults = {};

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadProviders();
        });

        // Load provider list
        async function loadProviders() {
            try {
                const response = await fetch('/api/providers');
                const data = await response.json();
                
                const providerList = document.getElementById('provider-list');
                providerList.innerHTML = '';

                data.providers.forEach(provider => {
                    const item = document.createElement('div');
                    item.className = `provider-item ${provider.has_saved_data ? 'has-data' : ''}`;
                    item.innerHTML = `
                        <div class="provider-info">
                            <h3>${provider.name}</h3>
                            <div class="provider-status">
                                ${provider.has_saved_data ? '✓ Data available' : 'No data yet'}
                            </div>
                        </div>
                        <button class="btn btn-primary btn-small" onclick="scrapeProvider('${provider.key}')">
                            Scrape
                        </button>
                    `;
                    providerList.appendChild(item);
                });
            } catch (error) {
                console.error('Error loading providers:', error);
            }
        }

        // Scrape single provider
        async function scrapeProvider(providerName) {
            currentProvider = providerName;
            showLoading();

            try {
                const response = await fetch(`/api/scrape/${providerName}`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.success) {
                    displayResults(providerName, data.plans);
                    showAlert(`Successfully scraped ${data.total_plans} plans from ${providerName}`, 'success');
                    loadProviders(); // Refresh provider list
                } else {
                    showAlert(`Error: ${data.error}`, 'error');
                }
            } catch (error) {
                showAlert(`Error: ${error.message}`, 'error');
            }
        }

        // Scrape all providers
        async function scrapeAll() {
            showLoading();

            try {
                const response = await fetch('/api/scrape/all', {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.success) {
                    showAlert(`Scraped ${data.total_plans} plans from ${data.providers_scraped} providers`, 'success');
                    loadAllResults();
                }
            } catch (error) {
                showAlert(`Error: ${error.message}`, 'error');
            }
        }

        // Load all saved results
        async function loadAllResults() {
            showLoading();

            try {
                const response = await fetch('/api/results');
                const data = await response.json();

                if (data.success) {
                    allResults = data.results;
                    updateStats(data);
                    displayAllResults(data.results);
                }
            } catch (error) {
                showAlert(`Error: ${error.message}`, 'error');
            }
        }

        // Display results
        function displayResults(provider, plans) {
            const resultsContent = document.getElementById('results-content');
            
            if (Array.isArray(plans)) {
                displayPlansTable(provider, plans);
            } else {
                // Multi-page provider (Occom)
                let html = `<h3>${provider.toUpperCase()} - Multiple Networks</h3>`;
                for (const [network, networkPlans] of Object.entries(plans)) {
                    html += `<h4>${network} (${networkPlans.length} plans)</h4>`;
                    html += createPlansTable(networkPlans);
                }
                resultsContent.innerHTML = html;
            }

            document.getElementById('download-section').classList.remove('hidden');
        }

        function displayAllResults(results) {
            const resultsContent = document.getElementById('results-content');
            let html = '';

            for (const [provider, providerData] of Object.entries(results)) {
                for (const [filename, plans] of Object.entries(providerData)) {
                    if (Array.isArray(plans)) {
                        html += `<h3>${provider.toUpperCase()} - ${filename}</h3>`;
                        html += createPlansTable(plans);
                    }
                }
            }

            resultsContent.innerHTML = html || '<p>No results found</p>';
            document.getElementById('download-section').classList.add('hidden');
        }

        function createPlansTable(plans) {
            if (!plans || plans.length === 0) return '<p>No plans found</p>';

            let html = `
                <table class="plans-table">
                    <thead>
                        <tr>
                            <th>Plan Name</th>
                            <th>Network</th>
                            <th>Speed (D/U)</th>
                            <th>Price/mth</th>
                            <th>Promo</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            plans.forEach(plan => {
                html += `
                    <tr>
                        <td>${plan.plan_name || 'N/A'}</td>
                        <td>${plan.network_type || 'N/A'}</td>
                        <td>${plan.download_speed || 'N/A'}/${plan.upload_speed || 'N/A'} Mbps</td>
                        <td>$${plan.price || 'N/A'}</td>
                        <td>${plan.promo_price ? `$${plan.promo_price}` : '-'}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            return html;
        }

        function displayPlansTable(provider, plans) {
            const resultsContent = document.getElementById('results-content');
            resultsContent.innerHTML = `
                <h3>${provider.toUpperCase()} - ${plans.length} plans</h3>
                ${createPlansTable(plans)}
            `;
        }

        function updateStats(data) {
            document.getElementById('stats-bar').classList.remove('hidden');
            document.getElementById('total-providers').textContent = data.providers.length;
            document.getElementById('total-plans').textContent = data.total_plans;
            
            // Calculate price and speed ranges from all plans
            const allPlans = [];
            for (const providerData of Object.values(data.results)) {
                for (const plans of Object.values(providerData)) {
                    if (Array.isArray(plans)) {
                        allPlans.push(...plans);
                    }
                }
            }

            if (allPlans.length > 0) {
                const prices = allPlans.map(p => p.price).filter(Boolean);
                const speeds = allPlans.map(p => p.download_speed).filter(Boolean);
                
                document.getElementById('price-range').textContent = 
                    `$${Math.min(...prices)}-$${Math.max(...prices)}`;
                document.getElementById('speed-range').textContent = 
                    `${Math.min(...speeds)}-${Math.max(...speeds)} Mbps`;
            }
        }

        function showLoading() {
            const resultsContent = document.getElementById('results-content');
            resultsContent.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Scraping in progress...</p>
                </div>
            `;
            document.getElementById('download-section').classList.add('hidden');
        }

        function showAlert(message, type) {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            
            document.querySelector('.container').insertBefore(alert, document.querySelector('.dashboard'));
            
            setTimeout(() => alert.remove(), 5000);
        }

        function downloadJSON() {
            if (currentProvider) {
                window.location.href = `/api/download/${currentProvider}/${currentProvider}_all_plans.json`;
            }
        }

        function downloadCSV() {
            if (currentProvider) {
                window.location.href = `/api/download/${currentProvider}/${currentProvider}_all_plans.csv`;
            }
        }
    </script>
</body>
</html>
